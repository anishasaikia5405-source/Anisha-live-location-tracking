<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Location Tracker | Advanced GPS Dashboard</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <i class="fas fa-satellite"></i>
                <h1>LiveTracker <span class="highlight">PRO</span></h1>
            </div>
            <div class="status-indicators">
                <div class="status-item" id="gpsStatus">
                    <i class="fas fa-satellite-dish"></i>
                    <span class="status-text">GPS Inactive</span>
                </div>
                <div class="status-item" id="trackingStatus">
                    <i class="fas fa-location-dot"></i>
                    <span class="status-text">Tracking Off</span>
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <!-- Map Container -->
            <div class="map-card glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-map"></i> Live Map</h2>
                    <div class="map-controls">
                        <button id="centerMapBtn" class="icon-btn" title="Center on location">
                            <i class="fas fa-crosshairs"></i>
                        </button>
                        <button id="zoomInBtn" class="icon-btn" title="Zoom in">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button id="zoomOutBtn" class="icon-btn" title="Zoom out">
                            <i class="fas fa-minus"></i>
                        </button>
                    </div>
                </div>
                <div id="map" class="map-container"></div>
            </div>

            <!-- Stats Cards Grid -->
            <div class="stats-grid">
                <!-- Speed Card -->
                <div class="stat-card glass-card" id="speedCard">
                    <div class="stat-icon">
                        <i class="fas fa-gauge-high"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Speed</h3>
                        <div class="stat-value" id="speedValue">0.00</div>
                        <div class="stat-unit">km/h</div>
                    </div>
                    <div class="stat-trend" id="speedTrend">
                        <i class="fas fa-minus"></i>
                    </div>
                </div>

                <!-- Battery Card -->
                <div class="stat-card glass-card" id="batteryCard">
                    <div class="stat-icon">
                        <i class="fas fa-battery-full"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Battery</h3>
                        <div class="stat-value" id="batteryValue">--</div>
                        <div class="stat-unit" id="batteryStatus">%</div>
                    </div>
                    <div class="stat-charging" id="chargingIndicator">
                        <i class="fas fa-bolt"></i>
                    </div>
                </div>

                <!-- Accuracy Card -->
                <div class="stat-card glass-card" id="accuracyCard">
                    <div class="stat-icon">
                        <i class="fas fa-bullseye"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Accuracy</h3>
                        <div class="stat-value" id="accuracyValue">--</div>
                        <div class="stat-unit">meters</div>
                    </div>
                    <div class="accuracy-indicator">
                        <div class="accuracy-dot"></div>
                    </div>
                </div>

                <!-- Distance Card -->
                <div class="stat-card glass-card" id="distanceCard">
                    <div class="stat-icon">
                        <i class="fas fa-route"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Distance</h3>
                        <div class="stat-value" id="distanceValue">0.00</div>
                        <div class="stat-unit">km</div>
                    </div>
                </div>
            </div>

            <!-- Coordinates Card -->
            <div class="coordinates-card glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-crosshairs"></i> Live Coordinates</h2>
                    <div class="timestamp" id="timestamp">--:--:--</div>
                </div>
                <div class="coordinates-grid">
                    <div class="coordinate-item">
                        <span class="coord-label">Latitude</span>
                        <span class="coord-value" id="latitude">--° --' --"</span>
                    </div>
                    <div class="coordinate-item">
                        <span class="coord-label">Longitude</span>
                        <span class="coord-value" id="longitude">--° --' --"</span>
                    </div>
                </div>
            </div>

            <!-- Device Info Card -->
            <div class="device-card glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-mobile-screen"></i> Device Info</h2>
                </div>
                <div class="device-info-grid">
                    <div class="info-item">
                        <i class="fas fa-laptop"></i>
                        <span id="deviceType">Unknown Device</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-microchip"></i>
                        <span id="platform">Unknown OS</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <span id="lastUpdate">Never</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-pin"></i>
                        <span id="historyCount">0 points</span>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel glass-card">
                <div class="panel-buttons">
                    <button id="startTrackingBtn" class="btn primary">
                        <i class="fas fa-play"></i> Start Tracking
                    </button>
                    <button id="stopTrackingBtn" class="btn secondary" disabled>
                        <i class="fas fa-stop"></i> Stop
                    </button>
                    <button id="resetPathBtn" class="btn warning">
                        <i class="fas fa-trash"></i> Reset Path
                    </button>
                    <button id="exportBtn" class="btn success">
                        <i class="fas fa-download"></i> Export JSON
                    </button>
                </div>
                <div class="settings-toggle">
                    <label class="switch">
                        <input type="checkbox" id="soundAlert" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Sound Alerts</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Audio for notifications -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTG9uZWx5TWVkaWFJbmNvcnBvcmF0ZWQAAHFRZW5jb2RlZAB4nJVgUQ7CIAyF7zIKBcT2/gcYjS5LdA5rYmJigsG9vUy8LEtL2/fSaC0NAACAPNZqJqCb0GKVqC0PcGqFwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
    </audio>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom JS Modules -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="battery.js"></script>
    <script src="speed.js"></script>
    <script src="map.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
</body>
  </html>
